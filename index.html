<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>LordFlix</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --black:#000;--bg:#0a0a0a;--card:#1c1c1e;--card2:#252528;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --muted:rgba(255,255,255,.42);--gold:#f5c518;--accent:#4d8ef0;
  --nav-h:68px;
}
html,body{background:var(--black);color:#fff;font-family:'Inter',-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ══ SEARCH OVERLAY ══ */
.search-overlay{
  position:fixed;top:0;right:0;bottom:0;left:0;z-index:400;
  background:rgba(0,0,0,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:none;flex-direction:column;
  padding-top:max(16px,env(safe-area-inset-top,0px));
}
.search-overlay.open{display:flex}
.search-bar{
  display:flex;align-items:center;gap:10px;
  padding:0 16px 14px;border-bottom:1px solid var(--border);
}
.search-input{
  flex:1;background:rgba(255,255,255,.08);border:1.5px solid var(--border2);
  border-radius:14px;padding:.6rem 1rem;color:#fff;
  font-family:'Inter',sans-serif;font-size:.9rem;font-weight:500;outline:none;
  transition:border-color .2s;
}
.search-input:focus{border-color:rgba(255,255,255,.3)}
.search-input::placeholder{color:var(--muted)}
.search-cancel{background:none;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;padding:.4rem;transition:color .15s;white-space:nowrap}
.search-cancel:hover{color:#fff}
.search-results{flex:1;overflow-y:auto;padding:12px 16px;scrollbar-width:none}
.search-results::-webkit-scrollbar{display:none}
.search-hint{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:8px;color:var(--muted)}
.search-hint i{font-size:2rem;opacity:.4}
.search-hint p{font-size:.8rem}

/* ══ GENRE SHEET ══ */
.sheet-overlay{position:fixed;top:0;right:0;bottom:0;left:0;z-index:300;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:none}
.sheet-overlay.open{display:block}
.genre-sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:310;
  background:#111;border-radius:22px 22px 0 0;border-top:1px solid var(--border2);
  padding:0 0 max(24px,env(safe-area-inset-bottom,0px)) 0;
  transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);
  max-height:75vh;overflow-y:auto;
}
.genre-sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:12px auto 0}
.sheet-title{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:14px 18px 8px}
.genre-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:4px 16px 8px}
.genre-btn{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:.6rem .9rem;color:rgba(255,255,255,.7);font-family:'Inter',sans-serif;
  font-size:.78rem;font-weight:600;cursor:pointer;text-align:left;
  display:flex;align-items:center;gap:7px;transition:all .15s;
}
.genre-btn:active{opacity:.7}
.genre-btn.active{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);color:#fff}
.genre-btn i{font-size:.72rem;opacity:.7;width:14px;text-align:center}

/* ══ HERO ══
   Bottom-anchoring via flexbox (margin-top:auto) instead of
   position:absolute+bottom — works on every browser, no svh/dvh
   or `inset` shorthand dependency. Height is set in px via JS
   (window.innerHeight) as the most reliable fallback. */
.hero{
  position:relative;width:100%;overflow:hidden;background:#000;
  height:100vh; /* fallback before JS runs */
  min-height:560px;
}
.slide{
  position:absolute;top:0;right:0;bottom:0;left:0;
  display:flex;flex-direction:column;
  opacity:0;transition:opacity .65s ease;pointer-events:none;
}
.slide.active{opacity:1;pointer-events:all}
.slide-bg{
  position:absolute;top:0;right:0;bottom:0;left:0;
  background-size:cover;background-position:center 15%;
  transform:scale(1.04);transition:transform 6s ease;z-index:0;
}
.slide.active .slide-bg{transform:scale(1)}
.slide-bg::after{
  content:'';position:absolute;top:0;right:0;bottom:0;left:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.3) 0%,rgba(0,0,0,0) 22%,rgba(0,0,0,.45) 50%,rgba(0,0,0,.85) 72%,#000 90%);
}

.top-logo{position:absolute;top:48px;left:20px;z-index:20;user-select:none;line-height:0}
.site-logo-img{height:30px;width:auto;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,.7))}
.logo-text{
  font-family:'Inter',-apple-system,sans-serif;
  font-size:1.18rem;font-weight:900;letter-spacing:-.03em;
  background:linear-gradient(90deg,#a78bfa 0%,#818cf8 40%,#c4b5fd 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;white-space:nowrap;flex-shrink:0;
  filter:drop-shadow(0 1px 8px rgba(139,92,246,.35));
}

/* Pushed to the bottom of .slide via margin-top:auto (flex) */
.slide-content{
  position:relative;z-index:10;margin-top:auto;width:100%;
  padding:0 22px 96px; /* 68px nav + 28px gap, hardcoded — calc(var()) unreliable on some browsers */
  display:flex;flex-direction:column;align-items:flex-start;text-align:left;
  box-sizing:border-box;
}
.slide-logo{max-width:72%;max-height:80px;object-fit:contain;object-position:left center;margin-bottom:12px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.85));display:block}
.slide-title-text{font-size:clamp(1.6rem,7vw,2.8rem);font-weight:800;letter-spacing:-.02em;line-height:1.05;text-shadow:0 2px 16px rgba(0,0,0,.8);margin-bottom:12px}
.meta-row{display:flex;align-items:center;justify-content:flex-start;gap:13px;margin-bottom:11px;font-size:.76rem;font-weight:500;color:rgba(255,255,255,.78)}
.meta-item{display:flex;align-items:center;gap:4px}
.meta-item i{font-size:.68rem;opacity:.75}
.star{color:var(--gold)!important;opacity:1!important}
.overview{font-size:.78rem;font-weight:400;color:rgba(255,255,255,.72);line-height:1.55;max-width:300px;margin:0 0 16px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.btn-row{display:flex;gap:9px;align-items:center;justify-content:flex-start;width:100%;max-width:340px}
.btn-play{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:#fff;color:#000;border:none;border-radius:50px;height:47px;font-family:'Inter',sans-serif;font-size:.86rem;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:opacity .15s}
.btn-play:active{opacity:.8}
.btn-secondary{display:flex;align-items:center;background:rgba(255,255,255,.12);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:#fff;border:1px solid rgba(255,255,255,.18);border-radius:50px;height:47px;cursor:pointer;padding:0 4px;transition:background .15s}
.btn-secondary:active{background:rgba(255,255,255,.22)}
.btn-icon{display:flex;align-items:center;justify-content:center;width:40px;height:40px;font-size:.85rem}
.btn-sep{width:1px;height:17px;background:rgba(255,255,255,.2);margin:0 1px}

.hero-dots{position:absolute;bottom:104px;left:22px;display:flex;gap:5px;z-index:20} /* hardcoded px — calc(var()) unreliable on some browsers */
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.28);transition:all .3s;cursor:pointer}
.dot.active{width:17px;border-radius:3px;background:#fff}

/* ══ PAGE VIEWS ══ */
.page{display:none;padding-bottom:88px} /* 68px nav + 20px gap, hardcoded */
.page.active{display:block}

/* ══ PAGE HEADER (movies / series) ══ */
.page-header{
  position:sticky;top:0;z-index:50;
  background:rgba(0,0,0,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:max(14px,calc(env(safe-area-inset-top,0px)+10px)) 16px 10px;
}
.page-header h2{font-size:1.1rem;font-weight:800;letter-spacing:-.02em;margin-bottom:10px}
.genre-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.genre-tabs::-webkit-scrollbar{display:none}
.g-tab{flex-shrink:0;background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:.28rem .75rem;color:var(--muted);font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.g-tab:active{opacity:.7}
.g-tab.active{background:#fff;border-color:#fff;color:#000}

/* ══ CONTENT ══ */
.below-hero{background:var(--black)}
.sec-title{padding:16px 14px 10px;font-size:1rem;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;justify-content:space-between}
.sec-title-left{display:flex;align-items:center;gap:8px}
.sec-title-bar{width:3px;height:18px;background:#6366f1;border-radius:2px;flex-shrink:0}
.sec-title span{font-size:.72rem;color:rgba(255,255,255,.4);font-weight:600;cursor:pointer;letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.sec-title span:hover{color:#fff}



/* ── BIG CARD (2-col grid, reference style) ── */
.big-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 14px}
.big-card{background:var(--card);border-radius:14px;overflow:hidden;cursor:pointer;transition:opacity .15s;position:relative}
.big-card:active{opacity:.72;transform:scale(.98)}
.big-card-poster{position:relative;width:100%;aspect-ratio:2/3;overflow:hidden;background:var(--card2)}
.big-card-poster img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s ease}
.big-card:active .big-card-poster img{transform:scale(1.04)}

/* Donut rating badge */
.big-card-rating{
  position:absolute;top:9px;right:9px;
  width:42px;height:42px;
  background:rgba(0,0,0,.82);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  z-index:3;
}
.big-card-rating svg{position:absolute;top:0;left:0;width:42px;height:42px;transform:rotate(-90deg)}
.big-card-rating circle{fill:none;stroke-width:3;stroke-linecap:round}
.big-card-rating .track{stroke:rgba(255,255,255,.12)}
.big-card-rating .fill{stroke:var(--gold);transition:stroke-dasharray .5s ease}
.big-card-rating .fill.green{stroke:#22c55e}
.big-card-rating .fill.red{stroke:#ef4444}
.big-card-rating span{font-size:.52rem;font-weight:800;color:#fff;z-index:1;letter-spacing:-.02em}

/* Bottom info strip */
.big-card-info{padding:8px 10px 10px}
.big-card-title{font-size:.8rem;font-weight:700;color:#fff;line-height:1.25;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;letter-spacing:-.01em}
.big-card-meta{display:flex;align-items:center;justify-content:space-between}
.big-card-year{font-size:.68rem;font-weight:600;color:var(--muted)}
.big-card-type{font-size:.55rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.5);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:5px;padding:.12rem .42rem}

/* Scroll row big cards */
.big-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 14px 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.big-scroll::-webkit-scrollbar{display:none}
.big-scroll .big-card{flex-shrink:0;width:140px}
.big-scroll .big-card-poster{aspect-ratio:2/3}

/* Full-page grid (movies/series pages) */
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px 14px}
@media(min-width:500px){.card-grid{grid-template-columns:repeat(3,1fr)}}

.rat{color:var(--gold)!important}

/* Load more */
.load-more-wrap{padding:12px 18px 4px;text-align:center}
.load-more{background:rgba(255,255,255,.08);border:1px solid var(--border2);border-radius:20px;padding:.5rem 1.5rem;color:rgba(255,255,255,.7);font-family:'Inter',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:background .15s}
.load-more:hover{background:rgba(255,255,255,.14)}
.load-more:disabled{opacity:.4;cursor:default}

/* Skeletons */
.skel{background:linear-gradient(90deg,#1c1c1e 25%,#252525 50%,#1c1c1e 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:10px;flex-shrink:0}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1rem;gap:10px;color:var(--muted)}
.empty i{font-size:2.2rem;opacity:.4}
.empty p{font-size:.82rem}

/* ══ BOTTOM NAV ══ */
.bnav{
  position:fixed;bottom:max(10px,env(safe-area-inset-bottom,0px));left:10px;right:10px;z-index:200;
  background:rgba(20,20,22,.84);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);
  border-radius:26px;border:1px solid rgba(255,255,255,.09);height:56px;
  display:flex;align-items:center;justify-content:space-around;padding:0 4px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
}
.bnav-btn{display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:13px;background:none;border:none;color:rgba(255,255,255,.38);font-size:1.08rem;cursor:pointer;transition:color .15s,background .15s}
.bnav-btn.active{color:#fff;background:rgba(255,255,255,.11)}
.bnav-btn:active{opacity:.65}
.home-bar{position:fixed;bottom:3px;left:50%;transform:translateX(-50%);width:128px;height:4px;background:rgba(255,255,255,.24);border-radius:2px;z-index:300}

/* ══ DIAG BANNER ══ */
#diagBanner{display:none;position:fixed;top:0;left:0;right:0;z-index:500;background:rgba(20,8,0,.97);border-bottom:1px solid rgba(245,197,24,.3);padding:12px 16px;gap:12px;align-items:flex-start;backdrop-filter:blur(10px)}
#diagBanner code{font-family:monospace;font-size:.7rem;background:rgba(255,255,255,.08);padding:.1rem .28rem;border-radius:3px}
</style>
</head>
<body>

<div id="diagBanner"></div>

<!-- ══ SEARCH OVERLAY ══ -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-bar">
    <input class="search-input" id="searchInput" type="search" placeholder="Buscar películas y series..." autocomplete="off" autocorrect="off">
    <button class="search-cancel" onclick="closeSearch()">Cancelar</button>
  </div>
  <div class="search-results" id="searchResults">
    <div class="search-hint"><i class="fa-solid fa-magnifying-glass"></i><p>Escribe para buscar</p></div>
  </div>
</div>

<!-- ══ GENRE SHEET ══ -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
<div class="genre-sheet" id="genreSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheetTitle">Géneros</div>
  <div class="genre-grid" id="genreGrid"></div>
</div>

<!-- ══ PAGE: HOME ══ -->
<div class="page active" id="page-home">
  <div class="hero" id="hero">
    <div class="top-logo"><span class="logo-text">PELISVIDHD</span></div>
    <div class="hero-dots" id="heroDots"></div>
  </div>
  <div class="below-hero">
    <div class="sec-title">
      <div class="sec-title-left"><div class="sec-title-bar"></div>Tendencias</div>
    </div>
    <div class="big-scroll" id="trendRow">
      <div class="skel" style="width:140px;aspect-ratio:2/3;flex-shrink:0"></div>
      <div class="skel" style="width:140px;aspect-ratio:2/3;flex-shrink:0"></div>
      <div class="skel" style="width:140px;aspect-ratio:2/3;flex-shrink:0"></div>
      <div class="skel" style="width:140px;aspect-ratio:2/3;flex-shrink:0"></div>
    </div>

    <div class="sec-title" style="margin-top:6px">
      <div class="sec-title-left"><div class="sec-title-bar"></div>Películas Populares</div>
      <span onclick="setPage('movies')">VER TODO <i class="fa-solid fa-chevron-right" style="font-size:.55rem"></i></span>
    </div>
    <div class="big-grid" id="popGrid">
      <div class="skel" style="aspect-ratio:2/3;border-radius:14px"></div>
      <div class="skel" style="aspect-ratio:2/3;border-radius:14px"></div>
      <div class="skel" style="aspect-ratio:2/3;border-radius:14px"></div>
      <div class="skel" style="aspect-ratio:2/3;border-radius:14px"></div>
    </div>

    <div class="sec-title" style="margin-top:14px">
      <div class="sec-title-left"><div class="sec-title-bar"></div>Series Populares</div>
      <span onclick="setPage('series')">VER TODO <i class="fa-solid fa-chevron-right" style="font-size:.55rem"></i></span>
    </div>
    <div class="big-scroll" id="seriesRow">
      <div class="skel" style="width:140px;aspect-ratio:2/3;flex-shrink:0"></div>
      <div class="skel" style="width:140px;aspect-ratio:2/3;flex-shrink:0"></div>
      <div class="skel" style="width:140px;aspect-ratio:2/3;flex-shrink:0"></div>
      <div class="skel" style="width:140px;aspect-ratio:2/3;flex-shrink:0"></div>
    </div>

    <div class="sec-title" style="margin-top:14px">
      <div class="sec-title-left"><div class="sec-title-bar"></div>Mejor Valoradas</div>
    </div>
    <div class="big-grid" id="topRow">
      <div class="skel" style="aspect-ratio:2/3;border-radius:14px"></div>
      <div class="skel" style="width:140px;aspect-ratio:2/3;border-radius:14px"></div>
      <div class="skel" style="aspect-ratio:2/3;border-radius:14px"></div>
      <div class="skel" style="aspect-ratio:2/3;border-radius:14px"></div>
    </div>
  </div>
</div>

<!-- ══ PAGE: MOVIES ══ -->
<div class="page" id="page-movies">
  <div class="page-header" style="padding-top:max(52px,calc(env(safe-area-inset-top,0px)+14px))">
    <h2 style="font-size:1.1rem;font-weight:800;letter-spacing:-.02em;margin-bottom:10px">Películas</h2>
    <div class="genre-tabs" id="movieTabs"></div>
  </div>
  <div class="card-grid" id="movieGrid">
    <div class="skel" style="aspect-ratio:2/3"></div>
    <div class="skel" style="aspect-ratio:2/3"></div>
    <div class="skel" style="aspect-ratio:2/3"></div>
    <div class="skel" style="aspect-ratio:2/3"></div>
    <div class="skel" style="aspect-ratio:2/3"></div>
    <div class="skel" style="aspect-ratio:2/3"></div>
  </div>
  <div class="load-more-wrap"><button class="load-more" id="movieLoadMore" onclick="loadMoreMovies()">Cargar más</button></div>
</div>

<!-- ══ PAGE: SERIES ══ -->
<div class="page" id="page-series">
  <div class="page-header" style="padding-top:max(52px,calc(env(safe-area-inset-top,0px)+14px))">
    <h2 style="font-size:1.1rem;font-weight:800;letter-spacing:-.02em;margin-bottom:10px">Series</h2>
    <div class="genre-tabs" id="seriesTabs"></div>
  </div>
  <div class="card-grid" id="seriesGrid">
    <div class="skel" style="aspect-ratio:2/3"></div>
    <div class="skel" style="aspect-ratio:2/3"></div>
    <div class="skel" style="aspect-ratio:2/3"></div>
    <div class="skel" style="aspect-ratio:2/3"></div>
    <div class="skel" style="aspect-ratio:2/3"></div>
    <div class="skel" style="aspect-ratio:2/3"></div>
  </div>
  <div class="load-more-wrap"><button class="load-more" id="seriesLoadMore" onclick="loadMoreSeries()">Cargar más</button></div>
</div>

<!-- ══ BOTTOM NAV ══ -->
<nav class="bnav">
  <button class="bnav-btn active" id="bn-home"   onclick="setPage('home')">  <i class="fa-solid fa-house"></i></button>
  <button class="bnav-btn"        id="bn-movies" onclick="setPage('movies')"><i class="fa-solid fa-clapperboard"></i></button>
  <button class="bnav-btn"        id="bn-series" onclick="setPage('series')"><i class="fa-solid fa-tv"></i></button>
  <button class="bnav-btn"        id="bn-search" onclick="openSearch()">     <i class="fa-solid fa-magnifying-glass"></i></button>
</nav>
<div class="home-bar"></div>

<script>
/* ══════════════════════════════════════════
   CONFIG
══════════════════════════════════════════ */
const IMG        = 'https://image.tmdb.org/t/p/';
const LOGO_CACHE = {};

const MOVIE_GENRES = {
  '':   'Todos',
  28:   'Acción', 12:'Aventura', 16:'Animación', 35:'Comedia',

/* ══════════════════════════════════════════
   TMDB PROXY
══════════════════════════════════════════ */
async function tmdb(path, params={}) {
  const u = new URL('/api/tmdb', location.origin);
  u.searchParams.set('path', path);
  u.searchParams.set('language', 'es-MX');
  Object.entries(params).forEach(([k,v]) => u.searchParams.set(k,v));
  try {
    const r = await fetch(u);
    if (!r.ok) {
      const err = await r.json().catch(()=>({error:'unknown'}));
      showDiag(r.status, err.error || r.statusText);
      return null;
    }
    return r.json();
  } catch(e) { showDiag(0, e.message); return null; }
}

function showDiag(status, msg) {
  if (_diagShown) return; _diagShown = true;
  const d = document.getElementById('diagBanner');
  let hint = status===404 ? 'Falta <code>functions/api/tmdb.js</code> en el repo.'
    : status===500 ? 'Añade <code>TMDB_KEY</code> en Cloudflare Pages → Settings → Environment Variables y haz redeploy.'
    : status===401 ? 'API Key de TMDB inválida.'
    : msg;
  d.innerHTML = `<i class="fa-solid fa-triangle-exclamation" style="color:#f5c518;font-size:1rem;flex-shrink:0;margin-top:2px"></i><div style="flex:1"><p style="font-size:.78rem;font-weight:700;margin-bottom:3px">Error ${status}: API no disponible</p><p style="font-size:.72rem;color:rgba(255,255,255,.5);line-height:1.5">${hint}</p></div><button onclick="this.parentElement.style.display='none'" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;flex-shrink:0"><i class="fa-solid fa-xmark"></i></button>`;
  d.style.display = 'flex';
}

/* ══════════════════════════════════════════
   LOGO FETCH
══════════════════════════════════════════ */
async function fetchLogo(id, type) {
  const key = `${type}_${id}`;
  if (LOGO_CACHE[key] !== undefined) return LOGO_CACHE[key];
  try {
    const u = new URL('/api/tmdb', location.origin);
    u.searchParams.set('path', `/${type}/${id}/images`);
    u.searchParams.set('include_image_language', 'es,en,null');
    const r = await fetch(u);
    if (!r.ok) { LOGO_CACHE[key]=null; return null; }
    const d = await r.json();
    const logos = d.logos||[];
    const pick = logos.find(l=>l.iso_639_1==='es') || logos.find(l=>l.iso_639_1==='en') || logos[0] || null;
    LOGO_CACHE[key] = pick ? `${IMG}w300${pick.file_path}` : null;
  } catch { LOGO_CACHE[key]=null; }
  return LOGO_CACHE[key];
}

async function buildSlide(idx) {
  const item = heroItems[idx]; if(!item) return;
  const type  = item.media_type||(item.first_air_date?'tv':'movie');
  const title = item.title||item.name||'';
  const year  = (item.release_date||item.first_air_date||'').split('-')[0];
  const rating= item.vote_average ? item.vote_average.toFixed(1) : '—';
  const logoUrl = await fetchLogo(item.id, type);

  const logoHTML = logoUrl
    ? `<img class="slide-logo" src="${logoUrl}" alt="${title}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><div class="slide-title-text" style="display:none">${title}</div>`
    : `<div class="slide-title-text">${title}</div>`;

  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.dataset.idx = idx;
  slide.innerHTML = `
    <div class="slide-bg" style="background-image:url(${IMG}original${item.backdrop_path})"></div>
    <div class="slide-content">
      ${logoHTML}
      <div class="meta-row">
        <div class="meta-item"><i class="fa-solid fa-star star"></i><span>${rating}</span></div>
        <div class="meta-item"><i class="fa-regular fa-calendar"></i><span>${year}</span></div>
        <div class="meta-item"><i class="fa-solid fa-${type==='movie'?'film':'tv'}"></i><span>${type==='movie'?'Película':'Serie'}</span></div>
      </div>
      <p class="overview">${item.overview||''}</p>
      <div class="btn-row">
        <button class="btn-play" onclick="goto(${item.id},'${type}','${title.replace(/'/g,"\\'")}')">
          <i class="fa-solid fa-play" style="font-size:.72rem"></i> PLAY
        </button>
        <button class="btn-secondary">
          <div class="btn-icon"><i class="fa-solid fa-plus"></i></div>
          <div class="btn-sep"></div>
          <div class="btn-icon" onclick="goto(${item.id},'${type}','${title.replace(/'/g,"\\'")}')"><i class="fa-solid fa-circle-info"></i></div>
        </button>
      </div>
    </div>`;
  document.getElementById('hero').insertBefore(slide, document.getElementById('heroDots'));
  return slide;
}

async function goSlide(idx) {
  clearTimeout(heroTimer);
  const hero = document.getElementById('hero');
  const cur  = hero.querySelector('.slide.active');
  let   next = hero.querySelector(`.slide[data-idx="${idx}"]`);
  if (!next) next = await buildSlide(idx);
  if (cur) cur.classList.remove('active');
  next.classList.add('active');
  heroIdx = idx;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  startAutoplay();
}
function startAutoplay() {
  clearTimeout(heroTimer);
  heroTimer = setTimeout(()=>goSlide((heroIdx+1)%heroItems.length), 5500);
}

/* ── Donut SVG helper ── */
function donutSVG(score) {
  const r    = 17;
  const circ = 2 * Math.PI * r;
  const pct  = Math.min(Math.max(score / 10, 0), 1);
  const dash = pct * circ;
  const cls  = score >= 7 ? 'green' : score >= 5 ? '' : 'red';
  return `<svg viewBox="0 0 42 42" width="42" height="42">
    <circle class="track" cx="21" cy="21" r="${r}"/>
    <circle class="fill ${cls}" cx="21" cy="21" r="${r}" stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}"/>
  </svg><span>${Math.round(score * 10)}%</span>`;
}

/* ── Unified big card (grid + scroll) ── */
function bigCardHTML(item, forcedType=null) {
  const type  = forcedType || item.media_type || (item.first_air_date ? 'tv' : 'movie');
  const title = item.title || item.name || '';
  const year  = (item.release_date || item.first_air_date || '').split('-')[0] || '';
  const score = item.vote_average || 0;
  const poster = item.poster_path
    ? `<img src="${IMG}w342${item.poster_path}" alt="${title}" loading="lazy">`
    : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.2);font-size:2rem"><i class="fa-solid fa-film"></i></div>`;
  const typeLabel = type === 'movie' ? 'FILME' : 'SÉRIE';
  const safetitle = title.replace(/'/g, "\'");
  return `<div class="big-card" onclick="goto(${item.id},'${type}','${safetitle}')">
    <div class="big-card-poster">
      ${poster}
      ${score > 0 ? `<div class="big-card-rating">${donutSVG(score)}</div>` : ''}
    </div>
    <div class="big-card-info">
      <div class="big-card-title">${title}</div>
      <div class="big-card-meta">
        <span class="big-card-year">${year}</span>
        <span class="big-card-type">${typeLabel}</span>
      </div>
    </div>
  </div>`;
}

function renderPosterRow(id, items, forcedType=null) {
  const el = document.getElementById(id); if (!el) return;
  if (!items?.length) { el.innerHTML = ''; return; }
  el.innerHTML = items.map(item => bigCardHTML(item, forcedType)).join('');

document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);

    document.getElementById('searchResults').innerHTML = '<div class="search-hint"><i class="fa-solid fa-magnifying-glass"></i><p>Escribe para buscar</p></div>';

async function doSearch(q) {
  const d = await tmdb('/search/multi', {query:q});
  if (!d) return;
  const results = d.results.filter(i=>i.media_type!=='person'&&(i.poster_path)&&(i.title||i.name));
  const el = document.getElementById('searchResults');
  if (!results.length) {
    el.innerHTML = `<div class="empty"><i class="fa-regular fa-circle-xmark"></i><p>Sin resultados para "${q}"</p></div>`;
    return;
  }
  el.innerHTML = `<div style="padding:8px 16px 4px;font-size:.72rem;color:var(--muted)">${results.length} resultados</div><div class="card-grid" id="searchGrid"></div>`;
  renderCardGrid('searchGrid', results, null);
  // Fix type for search results (multi search returns media_type)
  document.querySelectorAll('#searchGrid .cg-card').forEach((card, i) => {
    const item = results[i];
    if (item) {
      const type = item.media_type || (item.first_air_date?'tv':'movie');
      const title = item.title||item.name||'';
      card.setAttribute('onclick', `goto(${item.id},'${type}','${title.replace(/'/g,"\\'")}')`);
    }
  });
}

// Close search on Escape
document.addEventListener('keydown', e => {

  renderMode();
}
function syncNavUI() {
  ['trending','movies','series','anime'].forEach(x => {
    const nb = document.querySelector(`.nav-item:nth-child(${['trending','movies','series','anime'].indexOf(x)+1})`);
    const mi = document.getElementById('mi-'+x);
    const bi = document.getElementById('bn-'+x);
    if(nb) nb.classList.toggle('active', x===currentMode);
    if(mi) mi.className='menu-btn'+(x===currentMode?' active':'');
    if(bi) bi.classList.toggle('active', x===currentMode);
  });
}
function bNav(m, btn) {
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); setMode(m);
}

async function renderMode() {
  const c = document.getElementById('content');
  document.getElementById('heroSection').style.display = currentMode==='trending' ? 'block' : 'none';

  if (currentMode === 'trending') {
    c.innerHTML = `
      <div class="section">
        <div class="sec-hdr"><div class="sec-hdr-left"><div class="sec-bar red"></div><h2 class="sec-title">Em Alta</h2></div><button class="sec-see-all" onclick="setMode('trending')">Ver Todo</button></div>
        <div class="h-row" id="rankRow">${skRank(7)}</div>
      </div>
      <div class="section">
        <div class="sec-hdr"><div class="sec-hdr-left"><div class="sec-bar"></div><h2 class="sec-title">Filmes</h2></div><button class="sec-see-all" onclick="setMode('movies')">Ver Todo</button></div>
        <div class="h-row" id="moviesRow">${sk(10)}</div>
      </div>
      <div class="section">
        <div class="sec-hdr"><div class="sec-hdr-left"><div class="sec-bar gold"></div><h2 class="sec-title">Séries</h2></div><button class="sec-see-all" onclick="setMode('series')">Ver Todo</button></div>
        <div class="h-row" id="seriesRow">${sk(10)}</div>
      </div>
      <div class="section">
        <div class="sec-hdr"><div class="sec-hdr-left"><div class="sec-bar orange"></div><h2 class="sec-title">Anime</h2></div><button class="sec-see-all" onclick="setMode('anime')">Ver Todo</button></div>
        <div class="h-row" id="animeRow">${sk(10)}</div>
      </div>
      <div class="section">
        <div class="sec-hdr"><div class="sec-hdr-left"><div class="sec-bar pink"></div><h2 class="sec-title">Recientes</h2></div></div>
        <div class="h-row" id="recentRow">${sk(10)}</div>
      </div>`;
    loadRanking();
    fetchRow('/movie/popular','moviesRow','movie');
    fetchRow('/tv/popular','seriesRow','tv');
    fetchRow('/discover/tv','animeRow','tv',{with_genres:16,sort_by:'popularity.desc'});
    fetchRow('/tv/on_the_air','recentRow','tv');
  } else if (currentMode === 'movies') {
    c.innerHTML = buildBrowse('Películas','fa-film','movie');
    setupBrowse('movie');
  } else if (currentMode === 'series') {
    c.innerHTML = buildBrowse('Series','fa-tv','tv');
    setupBrowse('tv');
  } else if (currentMode === 'anime') {
    c.innerHTML = `<div class="section">
      <div class="sec-hdr"><div class="sec-hdr-left"><div class="sec-bar orange"></div><h2 class="sec-title">Anime</h2></div></div>
      <div class="h-row" id="mainGrid">${sk(18)}</div>
    </div>`;
    fetchRow('/discover/tv','mainGrid','tv',{with_genres:16,sort_by:'popularity.desc'});
  }
}

function buildBrowse(title, icon, type) {
  const tabs = [{id:'',name:'Todo'}, ...Object.entries(GENRES[type]).slice(0,10).map(([id,name])=>({id,name}))];
  return `<div class="section">
    <div class="sec-hdr"><div class="sec-hdr-left"><div class="sec-bar"></div><h2 class="sec-title">${title}</h2></div></div>
    <div style="display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.65rem;scrollbar-width:none;margin-bottom:1rem;-webkit-overflow-scrolling:touch" id="genreTabs">
      ${tabs.map(g=>`<button style="background:var(--card);border:1px solid var(--border);color:var(--muted2);font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;padding:.28rem .75rem;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0" class="gtab${g.id===''?' gactive':''}" data-id="${g.id}">${g.name}</button>`).join('')}
    </div>
    <div class="h-row" id="mainGrid">${sk(18)}</div>
  </div>`;
}

function setupBrowse(type) {
  const path = type==='movie' ? '/movie/popular' : '/tv/popular';
  fetchRow(path,'mainGrid',type);
  const tabs = document.getElementById('genreTabs');
  tabs.querySelectorAll('.gtab').forEach(btn => {
    btn.addEventListener('click', () => {
      tabs.querySelectorAll('.gtab').forEach(t=>{ t.style.background='var(--card)'; t.style.color='var(--muted2)'; t.style.borderColor='var(--border)'; });
      btn.style.background='var(--text)'; btn.style.color='var(--bg)'; btn.style.borderColor='var(--text)';
      const id = btn.dataset.id;
      document.getElementById('mainGrid').innerHTML = sk(18);
      const p = id ? `/discover/${type}` : path;
      const params = id ? {with_genres:id,sort_by:'popularity.desc'} : {};
      fetchRow(p,'mainGrid',type,params);
    });
  });
  // Style the first active tab
  const first = tabs.querySelector('.gtab');
  if(first){ first.style.background='var(--text)'; first.style.color='var(--bg)'; first.style.borderColor='var(--text)'; }
}

function sk(n, small=false) {
  return Array.from({length:n},()=>`<div class="skel skel-card" style="${small?'width:130px;':''}"></div>`).join('');
}
function skRank(n) {
  return Array.from({length:n},()=>`<div class="skel skel-rank"></div>`).join('');
}

async function loadHero() {
  const d = await api('/trending/all/week'); if(!d) return;
  heroItems = d.results.filter(i=>i.backdrop_path);
  setHero(heroItems[0]);
  document.getElementById('heroSection').style.display='block';

  // Thumbnails row (next 5)
  const thumbs = heroItems.slice(1,6);
  document.getElementById('heroThumbsRow').innerHTML = thumbs.map((item,i)=>`
    <div class="hero-thumb" onclick="setHero(heroItems[${i+1}])">
      <img src="${IMG}w92${item.poster_path}" alt="" loading="lazy">
    </div>`).join('');
}

async function setHero(item) {
  heroItem = item;
  const type = item.media_type || (item.first_air_date ? 'tv' : 'movie');
  const title = item.title || item.name || '';

  document.getElementById('heroBg').style.backgroundImage = `url(${IMG}original${item.backdrop_path})`;
  document.getElementById('heroDesc').textContent = item.overview || '';
  document.getElementById('heroRat').textContent = item.vote_average?.toFixed(1) || '';
  document.getElementById('heroYear').textContent = (item.release_date||item.first_air_date||'').split('-')[0];
  document.getElementById('heroRatBadge').style.display = item.vote_average ? 'flex' : 'none';

  // Genres (fetch detail for genre names)
  if (item.genre_ids?.length) {
    const gMap = type==='movie' ? GENRES.movie : GENRES.tv;
    const gnames = item.genre_ids.slice(0,3).map(id=>gMap[id]).filter(Boolean);
    document.getElementById('heroGenres').textContent = gnames.join(' · ');
  }

  // Logo
  const logoUrl = await fetchLogo(item.id, type);
  const hLogo = document.getElementById('heroLogoImg');
  const hTitle = document.getElementById('heroTitle');
  if (logoUrl) {
    hLogo.src = logoUrl; hLogo.style.display='block';
    hTitle.style.display='none';
  } else {
    hTitle.textContent = title; hTitle.style.display='block';
    hLogo.style.display='none';
  }

  // WL button
  const inWl = WL.some(w=>w.id===item.id);
  const btn = document.getElementById('heroFollowBtn');
  document.getElementById('heroFollowTxt').textContent = inWl ? 'acompanhando' : '+ acompanhar';
  btn.className = 'btn-follow' + (inWl?' saved':'');
}

function wlHero() {
  if(!heroItem) return;
  const type = heroItem.media_type || (heroItem.first_air_date?'tv':'movie');
  toggleWl({id:heroItem.id,type,title:heroItem.title||heroItem.name,poster:heroItem.poster_path,year:(heroItem.release_date||heroItem.first_air_date||'').split('-')[0],rating:heroItem.vote_average?.toFixed(1)||''});
  setHero(heroItem);
}

/* ══════════════════════════════════════════
   ROW FETCH
══════════════════════════════════════════ */
async function fetchRow(path, rowId, ft, params={}) {
  const d = await api(path, params); if(!d) return;
  const el = document.getElementById(rowId); if(!el) return;
  const items = d.results?.filter(i=>i.poster_path).slice(0,18) || [];
  if(!items.length){el.innerHTML=`<div class="empty"><i class="fa-regular fa-circle-xmark"></i><p>Sin resultados</p></div>`;return;}
  el.innerHTML = items.map((item,i)=>cardHTML(item,i,ft)).join('');
  // Inject logos async
  items.forEach(item=>{
    const type=ft||item.media_type||(item.first_air_date?'tv':'movie');
    injectLogo(item.id,type,item.title||item.name||'');
  });
}

/* ══════════════════════════════════════════
   LOGO INJECTION
══════════════════════════════════════════ */
async function injectLogo(id, type, fallback) {
  const url = await fetchLogo(id, type);
  document.querySelectorAll(`.card[data-id="${id}"] .card-logo-wrap`).forEach(wrap=>{
    if(url) wrap.innerHTML=`<img class="card-logo" src="${url}" alt="${fallback}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=\\'card-logo-text\\'>${fallback.replace(/'/g,"\\'")}</span>'">`;
    else    wrap.innerHTML=`<span class="card-logo-text">${fallback}</span>`;
  });
}

/* ══════════════════════════════════════════
   CARD HTML
══════════════════════════════════════════ */
function cardHTML(item, i=0, ft=null) {
  const type  = ft||item.media_type||(item.first_air_date?'tv':'movie');
  const title = item.title||item.name||'Sin título';
  const year  = (item.release_date||item.first_air_date||'').split('-')[0];
  const rat   = item.vote_average ? item.vote_average.toFixed(1) : '—';
  const inWl  = WL.some(w=>w.id===item.id);
  const poster = item.poster_path
    ? `<img class="card-img" src="${IMG}w300${item.poster_path}" alt="${title}" loading="lazy">`
    : `<div class="no-img"><i class="fa-solid fa-clapperboard"></i></div>`;
  const snap = encodeURIComponent(JSON.stringify({id:item.id,mt:type,title:item.title,name:item.name,ov:item.overview,pp:item.poster_path,bp:item.backdrop_path,va:item.vote_average,rd:item.release_date,fad:item.first_air_date}));

  return `<div class="card" style="animation-delay:${i*.025}s" data-id="${item.id}">
    <div class="card-poster" onclick="openModal(${item.id},'${type}',null,'${snap}')">
      ${poster}
      <div class="card-qual">HD</div>
      <div class="card-rat"><i class="fa-solid fa-star"></i>${rat}</div>
      <div class="card-logo-wrap" style="position:absolute;bottom:0;left:0;right:0;padding:.45rem .45rem .4rem;background:linear-gradient(to top,rgba(10,10,10,1) 0%,rgba(10,10,10,.8) 55%,transparent 100%);display:flex;align-items:flex-end;min-height:48px;pointer-events:none"></div>
      <div class="card-play"><div class="play-ico"><i class="fa-solid fa-play"></i></div></div>
    </div>
    <div class="card-wl ${inWl?'saved':''}" onclick="cardWl(event,${item.id},'${type}','${encodeURIComponent(title)}','${item.poster_path||''}','${year}','${rat}')">
      <i class="fa-solid ${inWl?'fa-check':'fa-bookmark'}"></i>
    </div>
    <div class="card-info" onclick="openModal(${item.id},'${type}',null,'${snap}')">
      <h4>${title}</h4>
      <div class="card-meta">
        <span>${year||'—'}</span>
        <span class="dot">·</span>
        <span class="card-type-lbl">${type==='movie'?'Filme':'Série'}</span>
      </div>
    </div>
  </div>`;
}

logoStyle.textContent = `.card-logo{max-width:78%;max-height:34px;object-fit:contain;object-position:left center;filter:drop-shadow(0 1px 4px rgba(0,0,0,.95));display:block;}.card-logo-text{font-size:.68rem;font-weight:700;color:#fff;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-shadow:0 1px 6px rgba(0,0,0,.95);max-width:88%;}`;

function cardWl(e, id, type, title, poster, year, rating) {

  document.querySelectorAll(`.card[data-id="${id}"] .card-wl`).forEach(b=>{
    const inWl=WL.some(w=>w.id===id);

document.getElementById('searchInput').addEventListener('input', e=>{
  clearTimeout(searchTmr);
  const q = e.target.value.trim();
  if(!q){document.getElementById('resultsHdr').style.display='none';renderMode();return;}
  searchTmr = setTimeout(()=>doSearch(q), 380);
});

async function doSearch(q) {
  document.getElementById('heroSection').style.display='none';
  const rh=document.getElementById('resultsHdr');
  rh.style.display='flex';
  rh.innerHTML=`<i class="fa-solid fa-magnifying-glass fa-spin"></i>Buscando <span>"${q}"</span>...`;
  document.getElementById('content').innerHTML=`<div class="section"><div class="h-row">${sk(10)}</div></div>`;
  const d = await api('/search/multi',{query:q}); if(!d) return;
  const f = d.results.filter(i=>i.media_type!=='person'&&(i.title||i.name)&&i.poster_path);
  rh.innerHTML=`<i class="fa-solid fa-list-ul"></i><span>${f.length}</span> resultados para <span>"${q}"</span>`;
  document.getElementById('content').innerHTML=`<div class="section"><div class="h-row" id="searchRow"></div></div>`;
  const el=document.getElementById('searchRow'); if(!el) return;
  el.innerHTML = f.map((item,i)=>cardHTML(item,i)).join('');
  f.forEach(item=>{
    const type=item.media_type||(item.first_air_date?'tv':'movie');
    injectLogo(item.id,type,item.title||item.name||'');
  });
}

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
async function openModal(id, type, itemData, rawJson) {
  let item = itemData;
  if(!item&&rawJson){try{item=JSON.parse(decodeURIComponent(rawJson));}catch(e){}}
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';

  if(item){
    document.getElementById('mTitle').textContent=item.title||item.name||'—';
    if(item.bp) document.getElementById('mBg').style.backgroundImage=`url(${IMG}original${item.bp})`;
    if(item.pp) document.getElementById('mPoster').src=`${IMG}w300${item.pp}`;
    document.getElementById('mDesc').textContent=item.ov||'Sin descripción.';
    document.getElementById('mBadges').innerHTML='<div class="skel" style="height:18px;width:180px;border-radius:4px"></div>';
    document.getElementById('mActs').innerHTML='<div class="skel" style="height:32px;width:220px;border-radius:8px"></div>';
    document.getElementById('trailerBox').innerHTML='<div class="trailer-ph"><i class="fa-solid fa-circle-notch fa-spin"></i><p>Cargando...</p></div>';
    document.getElementById('castRow').innerHTML='';document.getElementById('castLbl').style.display='none';
    document.getElementById('simRow').innerHTML='';document.getElementById('simLbl').style.display='none';
  }

  const [detail,videos,credits,similar] = await Promise.all([
    api(`/${type}/${id}`), api(`/${type}/${id}/videos`),
    api(`/${type}/${id}/credits`), api(`/${type}/${id}/similar`)
  ]);
  if(!detail) return;

  modalCurrent={id,type,title:detail.title||detail.name,poster:detail.poster_path,year:(detail.release_date||detail.first_air_date||'').split('-')[0],rating:detail.vote_average?.toFixed(1)||''};

  document.getElementById('mTitle').textContent=detail.title||detail.name||'—';
  if(detail.backdrop_path) document.getElementById('mBg').style.backgroundImage=`url(${IMG}original${detail.backdrop_path})`;
  if(detail.poster_path)   document.getElementById('mPoster').src=`${IMG}w342${detail.poster_path}`;
  document.getElementById('mDesc').textContent=detail.overview||'Sin descripción disponible.';

  const year=(detail.release_date||detail.first_air_date||'').split('-')[0];
  const rating=detail.vote_average?detail.vote_average.toFixed(1):'—';
  const extra=detail.runtime?`${detail.runtime} min`:detail.number_of_seasons?`${detail.number_of_seasons} temp.`:'';
  document.getElementById('mBadges').innerHTML=`
    <span class="bdg typ"><i class="fa-solid fa-${type==='movie'?'film':'tv'}"></i>${type==='movie'?'FILME':'SÉRIE'}</span>
    <span class="bdg rat"><i class="fa-solid fa-star"></i>${rating}</span>
    ${year?`<span class="bdg"><i class="fa-regular fa-calendar"></i>${year}</span>`:''}
    ${extra?`<span class="bdg"><i class="fa-regular fa-clock"></i>${extra}</span>`:''}
    ${(detail.genres||[]).slice(0,3).map(g=>`<span class="bdg">${g.name}</span>`).join('')}`;

  const inWl=WL.some(w=>w.id===id);
  document.getElementById('mActs').innerHTML=`
    <button class="btn-pri" onclick="closeModal();goto(${id},'${type}','${encodeURIComponent(detail.title||detail.name||'')}')"><i class="fa-solid fa-play"></i>Reproducir</button>
    <button class="btn-sec ${inWl?'saved':''}" id="mWlBtn" onclick="toggleModalWl()"><i class="fa-solid fa-${inWl?'check':'bookmark'}"></i>${inWl?'Guardado':'Mi Lista'}</button>`;

  const trailers=(videos?.results||[]).filter(v=>v.site==='YouTube'&&(v.type==='Trailer'||v.type==='Teaser'));
  document.getElementById('trailerBox').innerHTML=trailers.length
    ?`<iframe src="https://www.youtube.com/embed/${trailers[0].key}?rel=0" allowfullscreen allow="autoplay;encrypted-media"></iframe>`
    :`<div class="trailer-ph"><i class="fa-solid fa-video-slash"></i><p>Tráiler no disponible</p></div>`;

  const cast=(credits?.cast||[]).slice(0,14);
  if(cast.length){
    document.getElementById('castLbl').style.display='flex';
    document.getElementById('castRow').innerHTML=cast.map(c=>`<div class="c-chip"><div class="c-av">${c.profile_path?`<img src="${IMG}w92${c.profile_path}" alt="${c.name}" loading="lazy">`:`<div class="c-no"><i class="fa-solid fa-user"></i></div>`}</div><div class="c-name">${c.name}</div></div>`).join('');
  }
  const sims=(similar?.results||[]).filter(i=>i.poster_path).slice(0,10);
  if(sims.length){
    document.getElementById('simLbl').style.display='flex';
    document.getElementById('simRow').innerHTML=sims.map(s=>{
      const st=s.title||s.name||'';
      const snap2=encodeURIComponent(JSON.stringify({id:s.id,mt:type,title:s.title,name:s.name,ov:s.overview,pp:s.poster_path,bp:s.backdrop_path,va:s.vote_average,rd:s.release_date,fad:s.first_air_date}));
      return `<div class="sim-card" onclick="closeModal();setTimeout(()=>openModal(${s.id},'${type}',null,'${snap2}'),300)"><div class="sim-img"><img src="${IMG}w185${s.poster_path}" alt="${st}" loading="lazy"></div><p>${st}</p></div>`;
    }).join('');
  }
}

function toggleModalWl(){
  if(!modalCurrent)return;
  toggleWl(modalCurrent);
  const inWl=WL.some(w=>w.id===modalCurrent.id);
  const btn=document.getElementById('mWlBtn');
  if(btn){btn.innerHTML=`<i class="fa-solid fa-${inWl?'check':'bookmark'}"></i>${inWl?'Guardado':'Mi Lista'}`;btn.className='btn-sec'+(inWl?' saved':'');}
}
function closeOverlay(e){if(e.target===document.getElementById('overlay'))closeModal();}
function closeModal(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';const f=document.getElementById('trailerBox').querySelector('iframe');if(f)f.src='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();if(document.getElementById('drawer').classList.contains('open'))toggleDrawer();closeMenu();}});

function goto(id,type,title){location.href=`player.html?id=${id}&type=${type}&title=${encodeURIComponent(decodeURIComponent(String(title)))}`;}

/* ══════════════════════════════════════════
   WATCHLIST
══════════════════════════════════════════ */
function toggleWl(item){
  const idx=WL.findIndex(w=>w.id===item.id);
  if(idx>=0){WL.splice(idx,1);showToast('Eliminado de Mi Lista','info');}
  else{WL.push(item);showToast('Guardado en Mi Lista','success');}
  localStorage.setItem('cv_wl',JSON.stringify(WL));updateWlUI();
}
function updateWlUI(){
  const n=WL.length;
  const hBtn=document.getElementById('wlHdrBtn');
  if(hBtn)hBtn.className='hdr-icon'+(n>0?' has':'');
  const dot=document.getElementById('bDot');
  if(dot)dot.className='bnav-dot'+(n>0?' on':'');
  renderDrawer();
}
function renderDrawer(){
  const b=document.getElementById('drawerBody');if(!b)return;
  if(!WL.length){b.innerHTML=`<div class="wl-empty"><i class="fa-regular fa-bookmark"></i><p>Tu lista está vacía.</p></div>`;return;}
  b.innerHTML=WL.map((item,i)=>`<div class="wl-item" onclick="toggleDrawer();goto(${item.id},'${item.type}','${encodeURIComponent(item.title)}')">
    <div class="wl-th">${item.poster?`<img src="${IMG}w92${item.poster}" alt="${item.title}">`:`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--card);color:var(--muted)"><i class="fa-solid fa-film"></i></div>`}</div>
    <div class="wl-in"><h5>${item.title}</h5><p><i class="fa-solid fa-${item.type==='movie'?'film':'tv'}" style="color:var(--accent)"></i>${item.year||'—'}${item.rating?` · ★${item.rating}`:''}</p></div>
    <button class="wl-del" onclick="event.stopPropagation();delWl(${i})"><i class="fa-solid fa-xmark"></i></button>
  </div>`).join('');
}
function delWl(i){WL.splice(i,1);localStorage.setItem('cv_wl',JSON.stringify(WL));updateWlUI();showToast('Eliminado','info');}
function toggleDrawer(){const d=document.getElementById('drawer');d.classList.toggle('open');document.body.style.overflow=d.classList.contains('open')?'hidden':'';}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  document.getElementById('toastIco').className=type==='success'?'fa-solid fa-circle-check':type==='error'?'fa-solid fa-circle-xmark':'fa-solid fa-circle-info';
  document.getElementById('toastMsg').textContent=msg;
  t.className=`toast ${type} on`;clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),3000);
}
</script>
</body>
</html>
